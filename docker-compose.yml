services:
  postgres:
    image: postgres:16-alpine
    container_name: wargapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: warga
      POSTGRES_PASSWORD: warga_dev
      POSTGRES_DB: wargapp
    ports:
      - '5433:5432'
    volumes:
      - wargapp_pgdata:/var/lib/postgresql/data
      - ./api/db/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

volumes:
  wargapp_pgdata:
